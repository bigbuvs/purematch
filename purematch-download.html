<script type="text/plain" data-path="middleware.ts">import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'

const PROTECTED = ['/explore', '/matches', '/profile', '/dog', '/onboarding', '/documents', '/unlock']
const AUTH_ROUTES = ['/auth']

function hasAuthCookie(request: NextRequest): boolean {
  // Supabase-compatible clients store the session in cookies named sb-<project-ref>-auth-token
  // InsForge project ref is extracted from NEXT_PUBLIC_INSFORGE_URL at build time
  // We check for any cookie matching the pattern to avoid hardcoding the project ref
  for (const name of request.cookies.getAll().map(c => c.name)) {
    if (name.startsWith('sb-') && name.endsWith('-auth-token')) return true
  }
  return false
}

export function middleware(request: NextRequest) {
  const { pathname } = request.nextUrl
  const isAuthenticated = hasAuthCookie(request)

  const isProtected = PROTECTED.some(p => pathname === p || pathname.startsWith(p + '/'))
  const isAuthRoute = AUTH_ROUTES.some(p => pathname === p || pathname.startsWith(p + '/'))

  if (isProtected && !isAuthenticated) {
    const url = request.nextUrl.clone()
    url.pathname = '/auth'
    url.searchParams.set('next', pathname)
    return NextResponse.redirect(url)
  }

  if (isAuthRoute && isAuthenticated) {
    const next = request.nextUrl.searchParams.get('next')
    const url = request.nextUrl.clone()
    url.pathname = next && next.startsWith('/') ? next : '/explore'
    url.search = ''
    return NextResponse.redirect(url)
  }

  return NextResponse.next()
}

export const config = {
  matcher: ['/((?!_next/static|_next/image|favicon.ico|public/).*)'],
}
</script>

<script type="text/plain" data-path="app/auth/page.tsx">'use client'
import { useState } from 'react'
import { useRouter } from 'next/navigation'
import { insforge } from '@/lib/insforge'

export default function AuthPage() {
  const router = useRouter()
  const [tab, setTab] = useState<'login' | 'register'>('login')
  const [showPass, setShowPass] = useState(false)
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState('')
  const [form, setForm] = useState({ name: '', email: '', password: '' })

  const handleLogin = async (e: React.FormEvent) => {
    e.preventDefault()
    setLoading(true); setError('')
    const { error } = await insforge.auth.signInWithPassword({ email: form.email, password: form.password })
    if (error) { setError(error.message); setLoading(false); return }
    router.push('/explore')
  }

  const handleRegister = async (e: React.FormEvent) => {
    e.preventDefault()
    setLoading(true); setError('')
    const { error } = await insforge.auth.signUp({
      email: form.email,
      password: form.password,
      options: { data: { name: form.name } },
    })
    if (error) { setError(error.message); setLoading(false); return }
    router.push('/onboarding/user')
  }

  const handleGoogle = () =>
    insforge.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: `${window.location.origin}/explore` },
    })

  return (
    <div className="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center">
      <main className="w-full max-w-md px-8 py-16 flex flex-col items-center">
        <header className="mb-16 text-center">
          <h1 className="font-serif font-bold text-xl text-primary tracking-widest uppercase mb-2">PureMatch</h1>
          <p className="font-label-caps text-label-caps text-on-surface-variant">Registro Digital de Linaje Canino</p>
        </header>

        <div className="w-full">
          <div className="flex border-b border-outline-variant mb-8">
            <button onClick={() => { setTab('login'); setError('') }} className={`flex-1 py-2 font-label-caps text-label-caps text-center transition-colors ${tab === 'login' ? 'border-b-2 border-primary text-primary' : 'text-outline hover:text-primary'}`}>INGRESAR</button>
            <button onClick={() => { setTab('register'); setError('') }} className={`flex-1 py-2 font-label-caps text-label-caps text-center transition-colors ${tab === 'register' ? 'border-b-2 border-primary text-primary' : 'text-outline hover:text-primary'}`}>REGISTRARSE</button>
          </div>

          {error && <div className="bg-error-container text-on-error-container font-metadata text-xs px-4 py-3 rounded-lg mb-4">{error}</div>}

          {tab === 'login' ? (
            <form onSubmit={handleLogin} className="space-y-4 mb-8">

<script type="text/plain" data-path="app/explore/page.tsx">'use client'
import { useState, useEffect } from 'react'
import Link from 'next/link'
import TopBar from '@/components/TopBar'
import BottomNav from '@/components/BottomNav'
import { insforge } from '@/lib/insforge'
import type { Database } from '@/lib/database.types'

type Dog = Database['public']['Tables']['dogs']['Row']

const breeds = ['Todos', 'Golden Retriever', 'Border Collie', 'Labrador', 'Bulldog', 'Poodle', 'Husky']

export default function ExplorePage() {
  const [dogs, setDogs] = useState<Dog[]>([])
  const [loading, setLoading] = useState(true)
  const [search, setSearch] = useState('')
  const [activeBreed, setActiveBreed] = useState('Todos')

  useEffect(() => {
    insforge
      .from('dogs')
      .select('*')
      .eq('verified', true)
      .order('created_at', { ascending: false })
      .then(({ data }) => {
        setDogs(data ?? [])
        setLoading(false)
      })
  }, [])

  const filtered = dogs.filter(d => {
    const matchBreed = activeBreed === 'Todos' || d.breed === activeBreed
    const matchSearch = d.name.toLowerCase().includes(search.toLowerCase()) || d.breed.toLowerCase().includes(search.toLowerCase())
    return matchBreed && matchSearch
  })

  return (
    <div className="bg-surface text-on-surface min-h-screen flex flex-col">
      <TopBar />
      <main className="flex-grow pb-[100px] px-4 max-w-[680px] mx-auto w-full">
        <div className="sticky top-[72px] bg-surface z-40 pt-4 pb-3">
          <div className="relative mb-3">
            <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">search</span>
            <input className="w-full bg-surface-container-low border border-outline-variant rounded-full pl-10 pr-4 py-3 text-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary transition-colors" placeholder="Raza, nombre o zona..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div className="flex gap-2 overflow-x-auto pb-1">
            {breeds.map(b => (
              <button key={b} onClick={() => setActiveBreed(b)} className={`flex-shrink-0 px-4 py-1.5 rounded-full font-label-caps text-label-caps border transition-colors ${activeBreed === b ? 'bg-primary text-on-primary border-primary' : 'bg-transparent text-outline border-outline-variant hover:border-primary hover:text-primary'}`}>
                {b.toUpperCase()}
              </button>
            ))}
          </div>
        </div>

        {loading ? (
          <div className="flex justify-center py-16">
            <span className="material-symbols-outlined text-4xl text-outline-variant animate-spin">progress_activity</span>
          </div>
        ) : (
          <>
            <p className="font-metadata text-xs text-outline mb-4">{filtered.length} perfiles encontrados</p>
            <div className="flex flex-col gap-4">
              {filtered.map(dog => (
                <Link key={dog.id} href={`/dog/${dog.id}`} className="block">
                  <div className="bg-surface-container-low border border-outline-variant rounded-xl overflow-hidden hover:shadow-[0_4px_20px_rgba(0,0,0,0.08)] transition-shadow flex gap-4 p-4">
                    <div className="w-24 h-24 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container">
                      {dog.photos[0] && <img src={dog.photos[0]} alt={dog.name} className="w-full h-full object-cover" />}
                    </div>
                    <div className="flex flex-col justify-between flex-grow min-w-0">
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          <h2 className="font-headline-sm text-primary text-base truncate">{dog.name}</h2>
                          {dog.verified && <span className="material-symbols-outlined text-[#775a19] text-base flex-shrink-0" style={{ fontVariationSettings: "'FILL' 1" }}>verified</span>}
                        </div>
                        <p className="text-on-surface-variant text-sm">{dog.breed}</p>
                        <p className="font-metadata text-xs text-outline">{dog.age} · {dog.sex}</p>
                      </div>
                      {dog.zone && (
                        <div className="flex items-center gap-1 mt-2">
                          <span className="material-symbols-outlined text-outline text-sm">location_on</span>
                          <span className="font-metadata text-xs text-outline truncate">{dog.zone}</span>
                        </div>
                      )}
                    </div>
                    <span className="material-symbols-outlined text-outline-variant self-center">chevron_right</span>
                  </div>
                </Link>
              ))}
            </div>
            {filtered.length === 0 && (
              <div className="text-center py-16">
                <span className="material-symbols-outlined text-5xl text-outline-variant block mb-4">search_off</span>
                <p className="text-on-surface-variant">No se encontraron perfiles.</p>
              </div>
            )}
          </>
        )}
      </main>
      <BottomNav />
    </div>
  )
}
</script>
<script type="text/plain" data-path="app/dog/[id]/page.tsx">'use client'
import { useEffect, useState } from 'react'
import { useParams } from 'next/navigation'
import Link from 'next/link'
import TopBar from '@/components/TopBar'
import BottomNav from '@/components/BottomNav'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'
import type { Database } from '@/lib/database.types'

type Dog = Database['public']['Tables']['dogs']['Row']
type Document = Database['public']['Tables']['documents']['Row']

export default function DogProfilePage() {
  const { id } = useParams<{ id: string }>()
  const { user } = useAuth()
  const [dog, setDog] = useState<Dog | null>(null)
  const [docs, setDocs] = useState<Document[]>([])
  const [loading, setLoading] = useState(true)
  const [matchLoading, setMatchLoading] = useState(false)
  const [matchSent, setMatchSent] = useState(false)

  useEffect(() => {
    const load = async () => {
      const [{ data: dogData }, { data: docsData }] = await Promise.all([
        insforge.from('dogs').select('*').eq('id', id).single(),
        insforge.from('documents').select('*').eq('dog_id', id).eq('status', 'approved'),
      ])
      setDog(dogData)
      setDocs(docsData ?? [])

      if (user) {
        const { data: myDogs } = await insforge.from('dogs').select('id').eq('owner_id', user.id)
        if (myDogs?.length) {
          const myDogIds = myDogs.map(d => d.id)
          const { data: existing } = await insforge
            .from('matches')
            .select('id')
            .or(
              myDogIds.map(mid => `and(dog_a_id.eq.${mid},dog_b_id.eq.${id})`).join(',') +
              ',' +
              myDogIds.map(mid => `and(dog_a_id.eq.${id},dog_b_id.eq.${mid})`).join(',')
            )
            .limit(1)
          if (existing?.length) setMatchSent(true)
        }
      }

      setLoading(false)
    }
    load()
  }, [id, user])

  const handleMatch = async () => {
    if (!user || !dog) return
    setMatchLoading(true)
    const { data: myDogs } = await insforge.from('dogs').select('id').eq('owner_id', user.id).limit(1)
    if (!myDogs?.[0]) { setMatchLoading(false); return }
    await insforge.from('matches').insert({ dog_a_id: myDogs[0].id, dog_b_id: dog.id, status_a: 'accepted', status_b: 'pending', contact_unlocked: false })
    setMatchSent(true)
    setMatchLoading(false)
  }

  if (loading) return (
    <div className="bg-surface min-h-screen flex items-center justify-center">
      <span className="material-symbols-outlined text-5xl text-outline-variant animate-spin">progress_activity</span>
    </div>
  )

  if (!dog) return (
    <div className="bg-surface min-h-screen flex flex-col items-center justify-center gap-4">
      <span className="material-symbols-outlined text-5xl text-outline-variant">pets</span>
      <p className="text-on-surface-variant">Perfil no encontrado.</p>
    </div>
  )

  const docLabels: Record<string, string> = { pedigree: 'Certificado KCC', vaccines: 'Cartilla Vacunas', health: 'Prueba Displasia' }

  return (
    <div className="bg-surface text-on-surface min-h-screen flex flex-col">
      <TopBar showBack title="Perfil" />
      <main className="flex-grow pb-[100px] max-w-[680px] mx-auto w-full">
        <div className="w-full aspect-[4/5] sm:aspect-video relative bg-surface-container">
          {dog.photos[0] && <img src={dog.photos[0]} alt={dog.name} className="w-full h-full object-cover" />}
          <div className="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent" />
          <div className="absolute bottom-0 left-0 right-0 p-6">
            <div className="flex items-center gap-2 mb-1">
              <h1 className="text-white text-2xl font-bold">{dog.name}</h1>
              {dog.verified && <span className="material-symbols-outlined text-[#fed488] text-xl" style={{ fontVariationSettings: "'FILL' 1" }}>verified</span>}
            </div>
            <p className="text-white/80 text-sm">{dog.breed} · {dog.age} · {dog.sex}</p>
          </div>
          <div className="absolute top-4 right-4 bg-[#fed488] text-[#261900] font-label-caps text-label-caps px-3 py-1 rounded-full flex items-center gap-1">
            <span className="material-symbols-outlined text-sm" style={{ fontVariationSettings: "'FILL' 1" }}>star</span>
            {dog.score}
          </div>
        </div>

        <div className="px-4 py-6 flex flex-col gap-6">
          {dog.zone && (
            <div className="flex items-center gap-2 text-outline">
              <span className="material-symbols-outlined text-sm">location_on</span>
              <span className="font-metadata text-xs">{dog.zone}</span>
            </div>
          )}

          {dog.pedigree_number && (
            <div className="bg-surface-container-low border border-outline-variant rounded-xl p-4 flex items-center gap-3">
              <span className="material-symbols-outlined text-[#775a19]" style={{ fontVariationSettings: "'FILL' 1" }}>workspace_premium</span>
              <div>
                <p className="font-label-caps text-label-caps text-on-surface-variant">Nº PEDIGREE KCC</p>
                <p className="font-body-md text-primary font-semibold">{dog.pedigree_number}</p>
              </div>
            </div>
          )}

          {docs.length > 0 && (
            <div>
              <h2 className="font-headline-sm text-primary text-base mb-3">Documentación</h2>
              <div className="flex flex-col gap-2">
                {docs.map(doc => (
                  <div key={doc.id} className="flex items-center justify-between bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3">
                    <span className="text-on-surface">{docLabels[doc.type] ?? doc.type}</span>
                    <span className="material-symbols-outlined text-[#1b5e20]" style={{ fontVariationSettings: "'FILL' 1" }}>check_circle</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {dog.photos.length > 1 && (
            <div>
              <h2 className="font-headline-sm text-primary text-base mb-3">Galería</h2>
              <div className="grid grid-cols-3 gap-2">
                {dog.photos.slice(1).map((url, i) => (
                  <div key={i} className="aspect-square rounded-lg overflow-hidden">
                    <img src={url} alt="" className="w-full h-full object-cover" />
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="bg-surface-container border border-outline-variant rounded-xl p-5 flex flex-col gap-3">
            <div className="flex items-center gap-2">
              <span className="material-symbols-outlined text-outline" style={{ fontVariationSettings: "'FILL' 1" }}>lock</span>
              <p className="font-label-caps text-label-caps text-on-surface-variant">CONTACTO BLOQUEADO</p>
            </div>
            <p className="font-metadata text-xs text-outline leading-relaxed">Desbloquea el contacto del criador por $9.990 CLP después de un match mutuo.</p>
            {matchSent ? (
              <div className="w-full bg-surface-container text-on-surface-variant font-label-caps text-label-caps py-4 text-center rounded">
                ✓ SOLICITUD ENVIADA
              </div>
            ) : (
              <button onClick={handleMatch} disabled={matchLoading || !user} className="w-full bg-primary text-on-primary font-label-caps text-label-caps py-4 text-center hover:bg-primary-container transition-colors disabled:opacity-60">
                {matchLoading ? 'ENVIANDO...' : 'SOLICITAR MATCH'}
              </button>
            )}
            {!user && <p className="font-metadata text-[10px] text-outline text-center"><Link href="/auth" className="underline text-primary">Inicia sesión</Link> para solicitar un match.</p>}
          </div>
        </div>
      </main>
      <BottomNav />
    </div>
  )
}
</script>
<script type="text/plain" data-path="app/matches/page.tsx">'use client'
import { useState, useEffect } from 'react'
import Link from 'next/link'
import TopBar from '@/components/TopBar'
import BottomNav from '@/components/BottomNav'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'

interface MatchCard {
  id: string
  dogName: string
  breed: string
  zone: string | null
  photo: string | null
  unlocked: boolean
  phone: string | null
  mutual: boolean
}

export default function MatchesPage() {
  const { user } = useAuth()
  const [tab, setTab] = useState<'accepted' | 'pending'>('accepted')
  const [accepted, setAccepted] = useState<MatchCard[]>([])
  const [pending, setPending] = useState<MatchCard[]>([])
  const [loading, setLoading] = useState(true)

  useEffect(() => {
    if (!user) return
    const load = async () => {
      const { data: myDogs } = await insforge.from('dogs').select('id').eq('owner_id', user.id)
      if (!myDogs?.length) { setLoading(false); return }
      const dogIds = myDogs.map(d => d.id)

      const { data: matches } = await insforge
        .from('matches')
        .select('*, dog_a:dogs!dog_a_id(id,name,breed,zone,photos,owner_id), dog_b:dogs!dog_b_id(id,name,breed,zone,photos,owner_id)')
        .or(dogIds.map(id => `dog_a_id.eq.${id}`).join(',') + ',' + dogIds.map(id => `dog_b_id.eq.${id}`).join(','))

      const acc: MatchCard[] = []
      const pend: MatchCard[] = []

      for (const m of matches ?? []) {
        const iAmA = dogIds.includes((m.dog_a as any).id)
        const myStatus = iAmA ? m.status_a : m.status_b
        const theirStatus = iAmA ? m.status_b : m.status_a
        const otherDog = iAmA ? m.dog_b : m.dog_a

        const card: MatchCard = {
          id: m.id,
          dogName: (otherDog as any).name,
          breed: (otherDog as any).breed,
          zone: (otherDog as any).zone,
          photo: (otherDog as any).photos?.[0] ?? null,
          unlocked: m.contact_unlocked,
          phone: null,
          mutual: myStatus === 'accepted' && theirStatus === 'accepted',
        }

        if (card.mutual) acc.push(card)
        else if (myStatus === 'accepted') pend.push(card)
      }

      setAccepted(acc)
      setPending(pend)
      setLoading(false)
    }
    load()
  }, [user])

  return (
    <div className="bg-surface text-on-surface min-h-screen flex flex-col">
      <TopBar title="Matches" />
      <main className="flex-grow pb-[100px] px-4 max-w-[680px] mx-auto w-full pt-4">
        <div className="flex border-b border-outline-variant mb-6">
          <button onClick={() => setTab('accepted')} className={`flex-1 py-2 font-label-caps text-label-caps text-center transition-colors ${tab === 'accepted' ? 'border-b-2 border-primary text-primary' : 'text-outline hover:text-primary'}`}>ACEPTADOS ({accepted.length})</button>
          <button onClick={() => setTab('pending')} className={`flex-1 py-2 font-label-caps text-label-caps text-center transition-colors ${tab === 'pending' ? 'border-b-2 border-primary text-primary' : 'text-outline hover:text-primary'}`}>PENDIENTES ({pending.length})</button>
        </div>

        {loading ? (
          <div className="flex justify-center py-16"><span className="material-symbols-outlined text-4xl text-outline-variant animate-spin">progress_activity</span></div>
        ) : (
          <>
            {tab === 'accepted' && (
              <div className="flex flex-col gap-4">
                {accepted.map(m => (
                  <div key={m.id} className="bg-surface-container-low border border-outline-variant rounded-xl p-4 flex gap-4">
                    <div className="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container">
                      {m.photo && <img src={m.photo} alt={m.dogName} className="w-full h-full object-cover" />}
                    </div>
                    <div className="flex flex-col justify-between flex-grow min-w-0">
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          <span className="material-symbols-outlined text-[#1b5e20] text-sm" style={{ fontVariationSettings: "'FILL' 1" }}>favorite</span>
                          <span className="font-label-caps text-[10px] text-[#1b5e20]">MATCH MUTUO</span>
                        </div>
                        <h3 className="text-primary text-sm font-semibold truncate">{m.dogName}</h3>
                        <p className="font-metadata text-xs text-outline">{m.breed}{m.zone ? ` · ${m.zone}` : ''}</p>
                      </div>
                      <Link
                        href={`/unlock?match_id=${m.id}`}
                        className={`mt-2 inline-flex items-center gap-1 font-label-caps text-[10px] ${m.unlocked ? 'text-primary' : 'text-[#775a19]'}`}
                      >
                        <span className="material-symbols-outlined text-sm">{m.unlocked ? 'contact_phone' : 'lock_open'}</span>
                        {m.unlocked ? 'VER CONTACTO' : 'DESBLOQUEAR · $9.990'}
                      </Link>
                    </div>
                  </div>
                ))}
                {accepted.length === 0 && <div className="text-center py-16"><span className="material-symbols-outlined text-5xl text-outline-variant block mb-4">handshake</span><p className="text-on-surface-variant">Aún no tienes matches aceptados.</p></div>}
              </div>
            )}

            {tab === 'pending' && (
              <div className="flex flex-col gap-4">
                {pending.map(m => (
                  <div key={m.id} className="bg-surface-container-low border border-outline-variant rounded-xl p-4 flex gap-4 opacity-75">
                    <div className="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 relative bg-surface-container">
                      {m.photo && <img src={m.photo} alt={m.dogName} className="w-full h-full object-cover" />}
                      <div className="absolute inset-0 bg-primary/20" />
                    </div>
                    <div className="flex flex-col justify-center min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <span className="material-symbols-outlined text-outline text-sm">schedule</span>
                        <span className="font-label-caps text-[10px] text-outline">ESPERANDO RESPUESTA</span>
                      </div>
                      <h3 className="text-primary text-sm font-semibold truncate">{m.dogName}</h3>
                      <p className="font-metadata text-xs text-outline">{m.breed}</p>
                    </div>
                  </div>
                ))}
                {pending.length === 0 && <div className="text-center py-16"><span className="material-symbols-outlined text-5xl text-outline-variant block mb-4">schedule</span><p className="text-on-surface-variant">Sin solicitudes pendientes.</p></div>}
              </div>
            )}
          </>
        )}
      </main>
      <BottomNav />
    </div>
  )
}
</script>
<script type="text/plain" data-path="app/profile/page.tsx">'use client'
import { useState, useEffect } from 'react'
import Link from 'next/link'
import { useRouter } from 'next/navigation'
import TopBar from '@/components/TopBar'
import BottomNav from '@/components/BottomNav'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'
import type { Database } from '@/lib/database.types'

type Dog = Database['public']['Tables']['dogs']['Row']

export default function ProfilePage() {
  const { user, signOut } = useAuth()
  const router = useRouter()

  const [dogs, setDogs] = useState<Dog[]>([])

  useEffect(() => {
    if (!user) return
    const load = async () => {
      const [{ data: dogsData }, { count }] = await Promise.all([
        insforge.from('dogs').select('*').eq('owner_id', user.id),
        insforge.from('matches').select('*', { count: 'exact', head: true })
          .or(`dog_a_id.in.(${(dogsData ?? []).map((d: Dog) => d.id).join(',') || 'null'}),dog_b_id.in.(${(dogsData ?? []).map((d: Dog) => d.id).join(',') || 'null'})`)
          .eq('status_a', 'accepted').eq('status_b', 'accepted'),
      ])
      setDogs(dogsData ?? [])
      setMatchCount(count ?? 0)
      setLoading(false)
    }
    load()

  const handleSignOut = async () => {
    await signOut()
    router.push('/auth')

  const name = user?.user_metadata?.name ?? user?.email ?? 'Usuario'

      <main className="flex-grow pb-[100px] max-w-[680px] mx-auto w-full">
        <div className="bg-surface-container-low border-b border-outline-variant px-4 pt-6 pb-4 flex flex-col items-center gap-4">
          <div className="relative">
            <div className="w-24 h-24 rounded-full overflow-hidden border-[3px] border-[#fed488] bg-surface-container flex items-center justify-center">
              {user?.user_metadata?.avatar_url
                ? <img src={user.user_metadata.avatar_url} alt={name} className="w-full h-full object-cover" />
                : <span className="material-symbols-outlined text-4xl text-outline">person</span>

            </div>
          </div>
          <div className="text-center">
            <h1 className="font-headline-sm text-primary text-lg font-semibold">{name}</h1>
            <p className="font-metadata text-xs text-outline">Miembro desde {memberSince}</p>
          </div>
          <div className="flex w-full divide-x divide-outline-variant">
            {[{ label: 'Perros', value: dogs.length }, { label: 'Matches', value: matchCount }].map(s => (
              <div key={s.label} className="flex-1 flex flex-col items-center py-2">
                <span className="font-headline-sm text-primary text-xl font-bold">{loading ? '—' : s.value}</span>
                <span className="font-label-caps text-[10px] text-outline">{s.label.toUpperCase()}</span>
              </div>
            ))}

        </div>

        <div className="flex border-b border-outline-variant px-4">
          <button onClick={() => setTab('dogs')} className={`flex-1 py-3 font-label-caps text-label-caps text-center transition-colors ${tab === 'dogs' ? 'border-b-2 border-primary text-primary' : 'text-outline hover:text-primary'}`}>MIS PERROS</button>
          <button onClick={() => setTab('settings')} className={`flex-1 py-3 font-label-caps text-label-caps text-center transition-colors ${tab === 'settings' ? 'border-b-2 border-primary text-primary' : 'text-outline hover:text-primary'}`}>CONFIGURACIÓN</button>
        </div>

        <div className="px-4 py-6">
          {tab === 'dogs' && (
            <div className="flex flex-col gap-4">
              {dogs.map(dog => (
                <Link key={dog.id} href={`/dog/${dog.id}`} className="block">
                  <div className="bg-surface-container-low border border-outline-variant rounded-xl p-4 flex gap-4 hover:shadow-[0_4px_16px_rgba(0,0,0,0.06)] transition-shadow">
                    <div className="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container">
                      {dog.photos[0] && <img src={dog.photos[0]} alt={dog.name} className="w-full h-full object-cover" />}
                    </div>
                    <div className="flex flex-col justify-center flex-grow min-w-0">
                      <div className="flex items-center gap-1 mb-1">
                        <h3 className="text-primary text-sm font-semibold truncate">{dog.name}</h3>
                        <span className="material-symbols-outlined text-base flex-shrink-0" style={{ color: dog.verified ? '#775a19' : '#737973', fontVariationSettings: "'FILL' 1" }}>{dog.verified ? 'verified' : 'pending'}</span>
                      </div>
                      <p className="font-metadata text-xs text-outline">{dog.breed}</p>
                      <p className="font-label-caps text-[10px] mt-1 text-on-surface-variant">{dog.verified ? 'VERIFICADO' : 'EN REVISIÓN'}</p>
                    </div>
                    <span className="material-symbols-outlined text-outline-variant self-center">chevron_right</span>

              ))}
              <Link href="/onboarding/dog" className="border border-dashed border-outline-variant rounded-xl p-4 flex items-center justify-center gap-2 text-outline hover:border-primary hover:text-primary transition-colors">
                <span className="material-symbols-outlined">add</span>

</script>
<script type="text/plain" data-path="app/documents/page.tsx">'use client'
import { useState, useRef, useEffect } from 'react'
import { useSearchParams, useRouter } from 'next/navigation'
import TopBar from '@/components/TopBar'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'
import type { Database } from '@/lib/database.types'

type DocType = 'pedigree' | 'vaccines' | 'health'
type Dog = Database['public']['Tables']['dogs']['Row']
type Document = Database['public']['Tables']['documents']['Row']

interface DocZone {
  id: DocType
  label: string
  description: string
  required: boolean
}

const DOC_ZONES: DocZone[] = [
  { id: 'pedigree', label: 'Certificado KCC / Pedigree', description: 'PDF o imagen del registro oficial de la Kennel Club de Chile', required: true },
  { id: 'vaccines', label: 'Cartilla de Vacunas', description: 'Documento actualizado con todas las vacunas vigentes', required: true },
  { id: 'health', label: 'Prueba de Displasia / Salud', description: 'Certificado veterinario de pruebas genéticas y de salud', required: false },
]

const STATUS_CONFIG = {
  pending:  { label: 'EN REVISIÓN', bg: 'bg-[#fff8e1]', text: 'text-[#775a19]', icon: 'hourglass_empty' },
  approved: { label: 'APROBADO',    bg: 'bg-[#e8f5e9]', text: 'text-[#1b5e20]', icon: 'check_circle' },
  rejected: { label: 'RECHAZADO',   bg: 'bg-[#fce4ec]', text: 'text-error',     icon: 'cancel' },
}

export default function DocumentsPage() {
  const { user, loading: authLoading } = useAuth()
  const router = useRouter()
  const searchParams = useSearchParams()

  const [dogs, setDogs] = useState<Dog[]>([])
  const [selectedDogId, setSelectedDogId] = useState<string | null>(searchParams.get('dog_id'))
  const [existingDocs, setExistingDocs] = useState<Document[]>([])
  const [uploading, setUploading] = useState<Partial<Record<DocType, boolean>>>({})
  const [errors, setErrors] = useState<Partial<Record<DocType, string>>>({})
  const [submitting, setSubmitting] = useState(false)
  const [submitted, setSubmitted] = useState(false)
  const [pageLoading, setPageLoading] = useState(true)

  const fileInputRefs = useRef<Partial<Record<DocType, HTMLInputElement | null>>>({})

  useEffect(() => {
    if (authLoading) return
    if (!user) { router.replace('/auth'); return }

    insforge.from('dogs').select('*').eq('owner_id', user.id).then(({ data }) => {
      const list = data ?? []
      setDogs(list)
      if (!selectedDogId && list.length > 0) setSelectedDogId(list[0].id)
      setPageLoading(false)
    })
  }, [user, authLoading])

  useEffect(() => {
    if (!selectedDogId) return
    insforge.from('documents').select('*').eq('dog_id', selectedDogId).then(({ data }) => {
      setExistingDocs(data ?? [])
    })
  }, [selectedDogId])

  const getDoc = (type: DocType) => existingDocs.find(d => d.type === type)

  const handleUpload = async (type: DocType, file: File) => {
    if (!user || !selectedDogId) return
    if (file.size > 10 * 1024 * 1024) {
      setErrors(e => ({ ...e, [type]: 'El archivo supera 10 MB' }))
      return
    }

    setUploading(u => ({ ...u, [type]: true }))
    setErrors(e => ({ ...e, [type]: undefined }))

    const ext = file.name.split('.').pop()
    const path = `${selectedDogId}/${type}-${Date.now()}.${ext}`

    const { data: storageData, error: storageErr } = await insforge.storage
      .from('documents')
      .upload(path, file, { upsert: true })

    if (storageErr || !storageData) {
      setErrors(e => ({ ...e, [type]: 'Error al subir el archivo. Intenta de nuevo.' }))
      setUploading(u => ({ ...u, [type]: false }))
      return
    }

    const { data: { publicUrl } } = insforge.storage.from('documents').getPublicUrl(storageData.path)

    const existing = getDoc(type)
    if (existing) {
      await insforge.from('documents').update({ file_url: publicUrl, status: 'pending', reviewed_at: null }).eq('id', existing.id)
    } else {
      await insforge.from('documents').insert({ dog_id: selectedDogId, type, file_url: publicUrl, status: 'pending' })
    }

    const { data: refreshed } = await insforge.from('documents').select('*').eq('dog_id', selectedDogId)
    setExistingDocs(refreshed ?? [])
    setUploading(u => ({ ...u, [type]: false }))
  }

  const handleSubmit = async () => {
    if (!selectedDogId) return
    setSubmitting(true)
    // All uploads are already persisted individually; submission just flags intent
    await new Promise(r => setTimeout(r, 600))
    setSubmitted(true)
    setSubmitting(false)
  }

  const requiredDone = DOC_ZONES.filter(d => d.required).every(d => !!getDoc(d.id))

  if (authLoading || pageLoading) {
    return (
      <div className="min-h-screen bg-surface flex items-center justify-center">
        <span className="material-symbols-outlined text-outline animate-spin text-3xl">progress_activity</span>
      </div>
    )
  }

  if (submitted) {
    return (
      <div className="bg-surface text-on-surface min-h-screen flex flex-col">
        <TopBar showBack title="Documentación" />
        <div className="flex-grow flex flex-col items-center justify-center px-6 text-center gap-6">
          <div className="w-20 h-20 rounded-full bg-[#e8f5e9] flex items-center justify-center">
            <span className="material-symbols-outlined text-[#1b5e20] text-4xl" style={{ fontVariationSettings: "'FILL' 1" }}>check_circle</span>
          </div>
          <div>
            <h2 className="font-headline-sm text-headline-sm text-primary text-xl mb-2">Documentos enviados</h2>
            <p className="font-body-md text-sm text-on-surface-variant leading-relaxed">
              Nuestro equipo revisará tu documentación en 24–48 horas hábiles.<br />Te notificaremos cuando tu perfil esté verificado.
            </p>
          </div>
          <button onClick={() => router.push('/profile')} className="bg-primary text-on-primary font-label-caps text-label-caps px-8 py-3 hover:bg-primary-container transition-colors">
            VER MI PERFIL
          </button>
        </div>
      </div>
    )
  }

  return (
    <div className="bg-surface text-on-surface min-h-screen flex flex-col">
      <TopBar showBack title="Documentación" />

      <main className="flex-grow pb-[120px] px-4 max-w-[680px] mx-auto w-full pt-6">
        {/* Dog selector */}
        {dogs.length > 1 && (
          <div className="mb-6">
            <p className="font-label-caps text-[10px] text-outline mb-2">EJEMPLAR</p>
            <div className="flex gap-2 flex-wrap">
              {dogs.map(dog => (
                <button
                  key={dog.id}
                  onClick={() => setSelectedDogId(dog.id)}
                  className={`px-4 py-2 rounded-full border font-label-caps text-label-caps transition-colors ${
                    selectedDogId === dog.id
                      ? 'bg-primary text-on-primary border-primary'
                      : 'border-outline-variant text-outline hover:border-primary hover:text-primary'
                  }`}
                >
                  {dog.name}
                </button>
              ))}
            </div>
          </div>
        )}

        {dogs.length === 0 ? (
          <div className="text-center py-16">
            <span className="material-symbols-outlined text-outline text-4xl mb-3 block">pets</span>
            <p className="font-body-md text-sm text-on-surface-variant mb-4">Primero registra un ejemplar para subir documentos.</p>
            <button onClick={() => router.push('/onboarding/dog')} className="bg-primary text-on-primary font-label-caps text-label-caps px-6 py-3 hover:bg-primary-container transition-colors">
              REGISTRAR EJEMPLAR
            </button>
          </div>
        ) : (
          <>
            <div className="mb-8">
              <h2 className="font-headline-sm text-headline-sm text-primary text-xl mb-2">Sube tus documentos</h2>
              <p className="font-body-md text-body-md text-on-surface-variant text-sm leading-relaxed">
                Nuestro equipo revisará la documentación en 24–48 horas hábiles. Los documentos obligatorios son necesarios para activar tu perfil.
              </p>
            </div>

            <div className="flex flex-col gap-4">
              {DOC_ZONES.map(zone => {
                const existing = getDoc(zone.id)
                const isUploading = uploading[zone.id]

                return (
                  <div key={zone.id} className={`border rounded-xl p-5 transition-colors ${existing ? 'bg-surface-container border-primary/40' : 'bg-surface-container-low border-outline-variant'}`}>
                    <div className="flex items-start justify-between mb-3">
                      <div className="flex-grow">
                        <div className="flex items-center gap-2 mb-1">
                          <h3 className="font-label-caps text-label-caps text-on-surface">{zone.label}</h3>
                          {zone.required && <span className="text-error font-label-caps text-[10px]">*</span>}
                        </div>
                        <p className="font-metadata text-xs text-outline leading-relaxed">{zone.description}</p>
                      </div>
                      {existing && (
                        <span className={`font-label-caps text-[10px] px-2 py-1 rounded-full ml-3 flex-shrink-0 ${STATUS_CONFIG[existing.status as keyof typeof STATUS_CONFIG]?.bg} ${STATUS_CONFIG[existing.status as keyof typeof STATUS_CONFIG]?.text}`}>
                          {STATUS_CONFIG[existing.status as keyof typeof STATUS_CONFIG]?.label}
                        </span>
                      )}
                    </div>

                    {isUploading ? (
                      <div className="flex items-center justify-center gap-2 py-4 text-outline">
                        <span className="material-symbols-outlined text-base animate-spin">progress_activity</span>
                        <span className="font-label-caps text-[10px]">SUBIENDO...</span>
                      </div>
                    ) : existing ? (
                      <div className="flex items-center gap-2">
                        <div className="flex items-center gap-2 bg-surface-container rounded-lg px-3 py-2 flex-grow min-w-0">
                          <span className="material-symbols-outlined text-outline text-sm">description</span>
                          <a href={existing.file_url} target="_blank" rel="noopener noreferrer" className="font-metadata text-xs text-on-surface-variant truncate flex-grow hover:text-primary transition-colors">
                            Ver documento
                          </a>
                        </div>
                        <button onClick={() => fileInputRefs.current[zone.id]?.click()} className="text-outline hover:text-primary transition-colors p-2" title="Reemplazar">
                          <span className="material-symbols-outlined text-sm">upload</span>
                        </button>
                      </div>
                    ) : (
                      <button
                        onClick={() => fileInputRefs.current[zone.id]?.click()}
                        className="w-full border-2 border-dashed border-outline-variant rounded-lg py-6 flex flex-col items-center gap-2 hover:border-primary hover:bg-surface-container transition-colors"
                      >
                        <span className="material-symbols-outlined text-outline text-3xl">upload_file</span>
                        <span className="font-label-caps text-[10px] text-outline">SELECCIONAR ARCHIVO</span>
                        <span className="font-metadata text-[10px] text-outline-variant">PDF, JPG o PNG · máx. 10 MB</span>
                      </button>
                    )}

                    {errors[zone.id] && (
                      <p className="font-metadata text-[10px] text-error mt-2">{errors[zone.id]}</p>
                    )}

                    <input
                      ref={el => { fileInputRefs.current[zone.id] = el }}
                      type="file"
                      accept=".pdf,.jpg,.jpeg,.png"
                      className="hidden"
                      onChange={e => {
                        const file = e.target.files?.[0]
                        if (file) handleUpload(zone.id, file)
                        e.target.value = ''
                      }}
                    />
                  </div>
                )
              })}
            </div>

            <p className="font-metadata text-[10px] text-outline mt-4 text-center">
              * Campos obligatorios para activar el perfil de tu ejemplar.
            </p>
          </>
        )}
      </main>

      {dogs.length > 0 && (
        <div className="fixed bottom-0 left-0 right-0 bg-surface border-t border-outline-variant px-4 py-4 z-40">
          <div className="max-w-[680px] mx-auto">
            <button
              onClick={handleSubmit}
              disabled={!requiredDone || submitting}
              className={`w-full font-label-caps text-label-caps py-4 transition-colors flex items-center justify-center gap-2 ${
                requiredDone && !submitting
                  ? 'bg-primary text-on-primary hover:bg-primary-container cursor-pointer'
                  : 'bg-surface-container text-outline cursor-not-allowed'
              }`}
            >
              {submitting ? (
                <>
                  <span className="material-symbols-outlined text-base animate-spin">progress_activity</span>
                  ENVIANDO...
                </>
              ) : (
                'ENVIAR PARA REVISIÓN'
              )}
            </button>
          </div>
        </div>
      )}
    </div>
  )
}
</script>
<script type="text/plain" data-path="app/unlock/page.tsx">'use client'
import { useState, useEffect } from 'react'
import { useSearchParams, useRouter } from 'next/navigation'
import TopBar from '@/components/TopBar'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'
import type { Database } from '@/lib/database.types'

type Match = Database['public']['Tables']['matches']['Row']
type Dog = Database['public']['Tables']['dogs']['Row']

interface MatchWithDogs extends Match {
  dog_a: Dog
  dog_b: Dog
}

type PayMethod = 'webpay' | 'mercadopago'

export default function UnlockPage() {
  const { user, loading: authLoading } = useAuth()
  const router = useRouter()
  const searchParams = useSearchParams()
  const matchId = searchParams.get('match_id')

  const [matchData, setMatchData] = useState<MatchWithDogs | null>(null)
  const [myDog, setMyDog] = useState<Dog | null>(null)
  const [otherDog, setOtherDog] = useState<Dog | null>(null)
  const [ownerData, setOwnerData] = useState<{ name: string; phone: string | null; email: string } | null>(null)
  const [method, setMethod] = useState<PayMethod>('webpay')
  const [loading, setLoading] = useState(true)
  const [paying, setPaying] = useState(false)
  const [error, setError] = useState<string | null>(null)

  useEffect(() => {
    if (authLoading) return
    if (!user) { router.replace('/auth'); return }
    if (!matchId) { router.replace('/matches'); return }

    const load = async () => {
      const { data: match, error: matchErr } = await insforge
        .from('matches')
        .select('*, dog_a:dogs!dog_a_id(*), dog_b:dogs!dog_b_id(*)')
        .eq('id', matchId)
        .single()

      if (matchErr || !match) { router.replace('/matches'); return }

      const m = match as unknown as MatchWithDogs
      setMatchData(m)

      const { data: myDogs } = await insforge.from('dogs').select('*').eq('owner_id', user.id)
      const mine = myDogs?.find(d => d.id === m.dog_a_id || d.id === m.dog_b_id) ?? null
      const other = mine?.id === m.dog_a_id ? m.dog_b : m.dog_a
      setMyDog(mine)
      setOtherDog(other)

      if (m.contact_unlocked) {
        const { data: owner } = await insforge
          .from('users')
          .select('name, phone, email')
          .eq('id', other.owner_id)
          .single()
        if (owner) setOwnerData(owner)
      }

      setLoading(false)
    }

    load()
  }, [user, authLoading, matchId])

  const handlePay = async () => {
    if (!matchData) return
    setPaying(true)
    setError(null)

    // Simulate payment processing — replace with Webpay/MercadoPago redirect in production
    await new Promise(r => setTimeout(r, 1800))

    const { error: updateErr } = await insforge
      .from('matches')
      .update({ contact_unlocked: true, unlocked_at: new Date().toISOString() })
      .eq('id', matchData.id)

    if (updateErr) {
      setError('Error al procesar el pago. Intenta de nuevo.')
      setPaying(false)
      return
    }

    if (otherDog) {
      const { data: owner } = await insforge
        .from('users')
        .select('name, phone, email')
        .eq('id', otherDog.owner_id)
        .single()
      if (owner) setOwnerData(owner)
    }

    setMatchData(prev => prev ? { ...prev, contact_unlocked: true } : prev)
    setPaying(false)
  }

  if (authLoading || loading) {
    return (
      <div className="min-h-screen bg-surface flex items-center justify-center">
        <span className="material-symbols-outlined text-outline animate-spin text-3xl">progress_activity</span>
      </div>
    )
  }

        <div className="flex items-center justify-center gap-4">

              </div>
              <p className="font-label-caps text-[10px] text-on-surface-variant text-center max-w-[90px] truncate">{myDog.name}</p>

          <div className="flex flex-col items-center gap-1">

</script>
<script type="text/plain" data-path="app/admin/page.tsx">'use client'
import { useState, useEffect } from 'react'
import { useRouter } from 'next/navigation'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'

type ValidationStatus = 'pending' | 'approved' | 'rejected'

interface DocRow {
  id: string
  dog_id: string
  type: string
  file_url: string
  status: ValidationStatus
  uploaded_at: string
  dog: {
    id: string
    name: string
    breed: string
    owner_id: string
    verified: boolean
  }
  owner: {
    name: string
    email: string
  } | null
}

interface Stats {
  total: number
  pending: number
  verified: number
  rejected: number
}

const STATUS_CONFIG: Record<ValidationStatus, { label: string; bg: string; text: string }> = {
  pending:  { label: 'PENDIENTE', bg: 'bg-[#fff8e1]', text: 'text-[#775a19]' },
  approved: { label: 'APROBADO',  bg: 'bg-[#e8f5e9]', text: 'text-[#1b5e20]' },
  rejected: { label: 'RECHAZADO', bg: 'bg-[#fce4ec]', text: 'text-error' },
}

export default function AdminPage() {
  const { user, loading: authLoading } = useAuth()
  const router = useRouter()

  const [docs, setDocs] = useState<DocRow[]>([])
  const [stats, setStats] = useState<Stats>({ total: 0, pending: 0, verified: 0, rejected: 0 })
  const [filter, setFilter] = useState<ValidationStatus | 'all'>('all')
  const [expanded, setExpanded] = useState<string | null>(null)
  const [loading, setLoading] = useState(true)
  const [actionLoading, setActionLoading] = useState<string | null>(null)

  useEffect(() => {
    if (authLoading) return
    if (!user) { router.replace('/auth'); return }
    fetchData()
  }, [user, authLoading])

  const fetchData = async () => {
    setLoading(true)

    const [{ data: documents }, { data: dogsData }] = await Promise.all([
      insforge.from('documents').select('*, dog:dogs(id, name, breed, owner_id, verified)').order('uploaded_at', { ascending: false }),
      insforge.from('dogs').select('id, verified'),
    ])

    if (!documents) { setLoading(false); return }

    const ownerIds = [...new Set((documents as any[]).map((d: any) => d.dog?.owner_id).filter(Boolean))]
    const { data: owners } = ownerIds.length > 0
      ? await insforge.from('users').select('id, name, email').in('id', ownerIds)
      : { data: [] }

    const ownerMap = Object.fromEntries((owners ?? []).map(o => [o.id, o]))

    const rows: DocRow[] = (documents as any[]).map((d: any) => ({
      id: d.id,
      dog_id: d.dog_id,
      type: d.type,
      file_url: d.file_url,
      status: d.status as ValidationStatus,
      uploaded_at: d.uploaded_at,
      dog: d.dog,
      owner: d.dog?.owner_id ? (ownerMap[d.dog.owner_id] ?? null) : null,
    }))

    setDocs(rows)

    const dogs = dogsData ?? []
    setStats({
      total: dogs.length,
      pending: rows.filter(r => r.status === 'pending').length,
      verified: dogs.filter(d => d.verified).length,
      rejected: rows.filter(r => r.status === 'rejected').length,
    })

    setLoading(false)
  }

  const updateDocStatus = async (docId: string, status: ValidationStatus, dogId: string) => {
    setActionLoading(docId)

    await insforge.from('documents').update({ status, reviewed_at: new Date().toISOString() }).eq('id', docId)

    // If approving, check if dog now has all required docs approved → mark verified
    if (status === 'approved') {
      const { data: dogDocs } = await insforge
        .from('documents')
        .select('type, status')
        .eq('dog_id', dogId)

      const required = ['pedigree', 'vaccines']
      const allApproved = required.every(t => dogDocs?.some(d => d.type === t && d.status === 'approved'))
      if (allApproved) {
        await insforge.from('dogs').update({ verified: true, score: 80 }).eq('id', dogId)
      }
    }

    if (status === 'rejected') {
      await insforge.from('dogs').update({ verified: false }).eq('id', dogId)
    }

    setActionLoading(null)
    setExpanded(null)
    await fetchData()
  }

  const filtered = filter === 'all' ? docs : docs.filter(d => d.status === filter)

  if (authLoading || loading) {
    return (
      <div className="min-h-screen bg-surface flex items-center justify-center">
        <span className="material-symbols-outlined text-outline animate-spin text-3xl">progress_activity</span>
      </div>
    )
  }

  return (
    <div className="bg-surface text-on-surface min-h-screen flex">
      {/* Sidebar */}
      <aside className="hidden md:flex flex-col w-64 bg-surface-container-low border-r border-outline-variant h-screen sticky top-0">
        <div className="px-6 py-6 border-b border-outline-variant">
          <h1 className="font-serif font-bold text-xl text-primary tracking-widest uppercase">PureMatch</h1>
          <p className="font-label-caps text-[10px] text-outline mt-1">PANEL DE ADMINISTRACIÓN</p>
        </div>
        <nav className="flex flex-col gap-1 p-4 flex-grow">
          {[
            { icon: 'fact_check', label: 'Validaciones', active: true },
            { icon: 'pets',       label: 'Perfiles',     active: false },
            { icon: 'people',     label: 'Usuarios',     active: false },
            { icon: 'analytics',  label: 'Analíticas',   active: false },
          ].map(item => (
            <button
              key={item.label}
              className={`flex items-center gap-3 px-3 py-2.5 rounded-lg text-left w-full transition-colors font-body-md text-sm ${
                item.active ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container hover:text-on-surface'
              }`}
            >
              <span className="material-symbols-outlined text-base">{item.icon}</span>
              {item.label}
            </button>
          ))}
        </nav>
        <div className="p-4 border-t border-outline-variant">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-caps text-sm">A</div>
            <div>
              <p className="font-label-caps text-[10px] text-on-surface">Admin</p>
              <p className="font-metadata text-[10px] text-outline truncate max-w-[130px]">{user?.email}</p>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div className="flex-grow flex flex-col min-w-0">
        <header className="bg-surface border-b border-outline-variant px-6 py-4 flex items-center justify-between sticky top-0 z-10">
          <h2 className="font-headline-sm text-primary text-lg font-semibold">Validaciones de Documentos</h2>
          <div className="flex items-center gap-2">
            <span className="font-metadata text-xs text-outline">{new Date().toLocaleDateString('es-CL')}</span>
            <button onClick={fetchData} className="text-outline hover:text-primary transition-colors" title="Actualizar">
              <span className="material-symbols-outlined text-base">refresh</span>
            </button>
          </div>
        </header>

        <main className="p-6 flex flex-col gap-6">
          {/* Stats */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {[
              { label: 'Total Perfiles',  value: stats.total,    icon: 'pets',    color: 'text-primary' },
              { label: 'Docs Pendientes', value: stats.pending,  icon: 'pending', color: 'text-[#775a19]' },
              { label: 'Verificados',     value: stats.verified, icon: 'verified',color: 'text-[#1b5e20]' },
              { label: 'Rechazados',      value: stats.rejected, icon: 'cancel',  color: 'text-error' },
            ].map(s => (
              <div key={s.label} className="bg-surface-container-low border border-outline-variant rounded-xl p-5 flex flex-col gap-2">
                <span className={`material-symbols-outlined ${s.color}`} style={{ fontVariationSettings: "'FILL' 1" }}>{s.icon}</span>
                <p className={`font-headline-sm text-2xl font-bold ${s.color}`}>{s.value}</p>
                <p className="font-label-caps text-[10px] text-outline">{s.label.toUpperCase()}</p>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div className="flex gap-2 flex-wrap">
            {(['all', 'pending', 'approved', 'rejected'] as const).map(f => (
              <button
                key={f}
                onClick={() => setFilter(f)}
                className={`px-4 py-1.5 rounded-full font-label-caps text-label-caps border transition-colors ${
                  filter === f
                    ? 'bg-primary text-on-primary border-primary'
                    : 'bg-transparent text-outline border-outline-variant hover:border-primary hover:text-primary'
                }`}
              >
                {f === 'all' ? 'TODOS' : STATUS_CONFIG[f].label}
              </button>
            ))}
          </div>

          {/* Table */}
          <div className="bg-surface-container-low border border-outline-variant rounded-xl overflow-hidden">
            {filtered.length === 0 ? (
              <div className="py-12 text-center">
                <span className="material-symbols-outlined text-outline text-3xl block mb-2">inbox</span>
                <p className="font-body-md text-sm text-on-surface-variant">No hay documentos en esta categoría.</p>
              </div>
            ) : (
              <table className="w-full">
                <thead>
                  <tr className="border-b border-outline-variant bg-surface-container">
                    <th className="px-4 py-3 text-left font-label-caps text-[10px] text-outline">PERRO / TIPO</th>
                    <th className="px-4 py-3 text-left font-label-caps text-[10px] text-outline hidden sm:table-cell">PROPIETARIO</th>
                    <th className="px-4 py-3 text-left font-label-caps text-[10px] text-outline hidden md:table-cell">ENVIADO</th>
                    <th className="px-4 py-3 text-left font-label-caps text-[10px] text-outline">ESTADO</th>
                    <th className="px-4 py-3" />
                  </tr>
                </thead>
                <tbody className="divide-y divide-outline-variant">
                  {filtered.map(doc => (
                    <>
                      <tr
                        key={doc.id}
                        className="hover:bg-surface-container transition-colors cursor-pointer"
                        onClick={() => setExpanded(expanded === doc.id ? null : doc.id)}
                      >
                        <td className="px-4 py-3">
                          <p className="font-body-md text-sm text-on-surface font-medium">{doc.dog?.name ?? '—'}</p>
                          <p className="font-metadata text-[10px] text-outline capitalize">{doc.type}</p>
                        </td>
                        <td className="px-4 py-3 hidden sm:table-cell">
                          <p className="font-body-md text-sm text-on-surface-variant">{doc.owner?.name ?? '—'}</p>
                          <p className="font-metadata text-[10px] text-outline">{doc.owner?.email ?? ''}</p>
                        </td>
                        <td className="px-4 py-3 hidden md:table-cell">
                          <p className="font-metadata text-xs text-outline">
                            {new Date(doc.uploaded_at).toLocaleDateString('es-CL')}
                          </p>
                        </td>
                        <td className="px-4 py-3">
                          <span className={`px-2 py-1 rounded-full font-label-caps text-[10px] ${STATUS_CONFIG[doc.status].bg} ${STATUS_CONFIG[doc.status].text}`}>
                            {STATUS_CONFIG[doc.status].label}
                          </span>
                        </td>
                        <td className="px-4 py-3">
                          <span className="material-symbols-outlined text-outline text-sm">
                            {expanded === doc.id ? 'expand_less' : 'expand_more'}
                          </span>
                        </td>
                      </tr>
                      {expanded === doc.id && (
                        <tr key={`${doc.id}-expanded`}>
                          <td colSpan={5} className="bg-surface-container px-6 py-4">
                            <div className="flex flex-col gap-4">
                              <div className="flex items-center gap-3">
                                <a
                                  href={doc.file_url}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="flex items-center gap-2 px-4 py-2 border border-outline-variant rounded-lg hover:border-primary hover:text-primary transition-colors font-label-caps text-[10px] text-outline"
                                >
                                  <span className="material-symbols-outlined text-sm">open_in_new</span>
                                  VER DOCUMENTO
                                </a>
                                <span className="font-metadata text-[10px] text-outline">{doc.dog?.breed}</span>
                              </div>
                              {doc.status === 'pending' && (
                                <div className="flex gap-3">
                                  <button
                                    disabled={actionLoading === doc.id}
                                    onClick={() => updateDocStatus(doc.id, 'approved', doc.dog_id)}
                                    className="bg-[#1b5e20] text-white font-label-caps text-label-caps px-6 py-2 hover:bg-[#2e7d32] transition-colors disabled:opacity-60 flex items-center gap-2"
                                  >
                                    {actionLoading === doc.id && <span className="material-symbols-outlined text-sm animate-spin">progress_activity</span>}
                                    APROBAR
                                  </button>
                                  <button
                                    disabled={actionLoading === doc.id}
                                    onClick={() => updateDocStatus(doc.id, 'rejected', doc.dog_id)}
                                    className="bg-error text-white font-label-caps text-label-caps px-6 py-2 hover:bg-error/80 transition-colors disabled:opacity-60"
                                  >
                                    RECHAZAR
                                  </button>
                                </div>
                              )}
                            </div>
                          </td>
                        </tr>
                      )}
                    </>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </main>
      </div>
    </div>
  )
}
</script>
<script type="text/plain" data-path="app/onboarding/user/page.tsx">'use client'
import { useState } from 'react'
import { useRouter } from 'next/navigation'
import Link from 'next/link'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'

const zones = ['Región Metropolitana','Valparaíso','Biobío','Araucanía','Los Lagos','Antofagasta','Coquimbo','Maule',"O'Higgins",'Atacama']

export default function OnboardingUserPage() {
  const router = useRouter()
  const { user } = useAuth()
  const [form, setForm] = useState({ name: '', phone: '', zone: '', rut: '' })
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState('')
  const allFilled = form.name && form.phone && form.zone

  const handleContinue = async (e: React.FormEvent) => {
    e.preventDefault()
    if (!user) return
    setLoading(true); setError('')
    const { error } = await insforge.from('users').upsert({
      id: user.id,
      name: form.name,
      email: user.email!,
      phone: form.phone,
      zone: form.zone,
      rut: form.rut || null,
    })
    if (error) { setError(error.message); setLoading(false); return }
    router.push('/onboarding/dog')

<script type="text/plain" data-path="app/onboarding/dog/page.tsx">'use client'
import { useState, useRef } from 'react'
import { useRouter } from 'next/navigation'
import Link from 'next/link'
import { insforge } from '@/lib/insforge'
import { useAuth } from '@/context/AuthContext'

const breeds = ['Border Collie','Golden Retriever','Labrador Retriever','Bulldog Inglés','Poodle','Husky Siberiano','German Shepherd','Beagle','Boxer','Dachshund','Chihuahua','Rottweiler','Yorkshire Terrier','Doberman']

export default function OnboardingDogPage() {
  const router = useRouter()
  const { user } = useAuth()
  const [form, setForm] = useState({ name: '', breed: '', age: '', sex: '' as 'Macho' | 'Hembra' | '', pedigree: '' })
  const [photos, setPhotos] = useState<File[]>([])
  const [previews, setPreviews] = useState<string[]>([])
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState('')
  const fileRef = useRef<HTMLInputElement>(null)
  const allFilled = form.name && form.breed && form.age && form.sex

  const handlePhoto = (file: File) => {
    if (photos.length >= 6) return
    setPhotos(prev => [...prev, file])
    setPreviews(prev => [...prev, URL.createObjectURL(file)])
  }

  const removePhoto = (i: number) => {
    setPhotos(prev => prev.filter((_, idx) => idx !== i))
    setPreviews(prev => prev.filter((_, idx) => idx !== i))
  }

  const handleSubmit = async (e: React.FormEvent) => {
    e.preventDefault()
    if (!user) return
    setLoading(true); setError('')

    // Upload photos to InsForge Storage
    const photoUrls: string[] = []
    for (const file of photos) {
      const ext = file.name.split('.').pop()
      const path = `${user.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`
      const { data, error: uploadError } = await insforge.storage.from('dog-photos').upload(path, file)
      if (uploadError) { setError(uploadError.message); setLoading(false); return }
      const { data: { publicUrl } } = insforge.storage.from('dog-photos').getPublicUrl(data.path)
      photoUrls.push(publicUrl)
    }

    const { data: inserted, error: insertError } = await insforge.from('dogs').insert({
      owner_id: user.id,
      name: form.name,
      breed: form.breed,
      age: form.age,
      sex: form.sex as 'Macho' | 'Hembra',
      pedigree_number: form.pedigree || null,
      zone: null,
      photos: photoUrls,
    }).select('id').single()

    if (insertError || !inserted) { setError(insertError?.message ?? 'Error al guardar'); setLoading(false); return }
    router.push(`/documents?dog_id=${inserted.id}`)
  }

  return (
    <div className="bg-surface text-on-surface min-h-screen flex flex-col items-center">
      <main className="w-full max-w-md px-6 py-12 flex flex-col">
        <div className="flex items-center gap-2 mb-8">
          <div className="flex items-center gap-1">
            <div className="w-8 h-8 rounded-full bg-surface-container text-outline flex items-center justify-center font-label-caps text-label-caps">1</div>
            <span className="font-label-caps text-[10px] text-outline">TU PERFIL</span>
          </div>
          <div className="flex-grow h-px bg-primary" />
          <div className="flex items-center gap-1">
            <div className="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-caps text-label-caps">2</div>
            <span className="font-label-caps text-[10px] text-primary">TU PERRO</span>
          </div>
        </div>

        <header className="mb-8">
          <h1 className="font-serif font-bold text-xl text-primary tracking-widest uppercase mb-1">PureMatch</h1>
          <h2 className="font-headline-sm text-primary text-2xl mb-2">Registra tu perro</h2>
          <p className="text-on-surface-variant text-sm">Agrega las fotos y datos de tu ejemplar.</p>
        </header>

        {error && <div className="bg-error-container text-on-error-container text-xs px-4 py-3 rounded-lg mb-4">{error}</div>}

        <div className="mb-6">
          <label className="font-label-caps text-label-caps text-on-surface-variant mb-3 ml-1 block">FOTOS (máx. 6)</label>
          <div className="grid grid-cols-3 gap-2">
            {previews.map((url, i) => (
              <div key={i} className="aspect-square rounded-lg overflow-hidden relative group">
                <img src={url} alt="" className="w-full h-full object-cover" />
                <button onClick={() => removePhoto(i)} className="absolute inset-0 bg-primary/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                  <span className="material-symbols-outlined text-white">close</span>
                </button>
              </div>
            ))}
            {previews.length < 6 && (
              <button type="button" onClick={() => fileRef.current?.click()} className="aspect-square rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-1 hover:border-primary hover:bg-surface-container transition-colors">
                <span className="material-symbols-outlined text-outline text-2xl">add_photo_alternate</span>
                <span className="font-label-caps text-[9px] text-outline">FOTO</span>
              </button>
            )}
          </div>
          <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e => { const f = e.target.files?.[0]; if (f) handlePhoto(f); e.target.value = '' }} />
        </div>

        <form onSubmit={handleSubmit} className="flex flex-col gap-5">
          <div className="flex flex-col">
            <label className="font-label-caps text-label-caps text-on-surface-variant mb-1 ml-1">NOMBRE DEL PERRO *</label>
            <input className="bg-surface-container-low border-b border-primary border-t-0 border-l-0 border-r-0 focus:ring-0 px-4 py-3 placeholder:text-outline-variant text-body-md" placeholder="Ej. Arya von Westwood" type="text" value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} />
          </div>
          <div className="flex flex-col">
            <label className="font-label-caps text-label-caps text-on-surface-variant mb-1 ml-1">RAZA *</label>
            <div className="relative">
              <select className="w-full bg-surface-container-low border-b border-primary border-t-0 border-l-0 border-r-0 focus:ring-0 px-4 py-3 text-body-md appearance-none cursor-pointer" value={form.breed} onChange={e => setForm(p => ({ ...p, breed: e.target.value }))}>
                <option value="">Selecciona la raza</option>
                {breeds.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
              <span className="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
            </div>
          </div>
          <div className="flex gap-4">
            <div className="flex flex-col flex-1">
              <label className="font-label-caps text-label-caps text-on-surface-variant mb-1 ml-1">EDAD *</label>
              <input className="bg-surface-container-low border-b border-primary border-t-0 border-l-0 border-r-0 focus:ring-0 px-4 py-3 placeholder:text-outline-variant text-body-md" placeholder="Ej. 2 años" type="text" value={form.age} onChange={e => setForm(p => ({ ...p, age: e.target.value }))} />
            </div>
            <div className="flex flex-col flex-1">
              <label className="font-label-caps text-label-caps text-on-surface-variant mb-1 ml-1">SEXO *</label>
              <div className="flex gap-2 mt-1">
                {(['Macho', 'Hembra'] as const).map(s => (
                  <button key={s} type="button" onClick={() => setForm(p => ({ ...p, sex: s }))} className={`flex-1 py-3 font-label-caps text-label-caps border transition-colors ${form.sex === s ? 'bg-primary text-on-primary border-primary' : 'bg-transparent text-outline border-outline-variant hover:border-primary'}`}>
                    {s.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div className="flex flex-col">
            <label className="font-label-caps text-label-caps text-on-surface-variant mb-1 ml-1">Nº PEDIGREE KCC (opcional)</label>
            <input className="bg-surface-container-low border-b border-primary border-t-0 border-l-0 border-r-0 focus:ring-0 px-4 py-3 placeholder:text-outline-variant text-body-md" placeholder="Ej. KCC-2024-BC-00892" type="text" value={form.pedigree} onChange={e => setForm(p => ({ ...p, pedigree: e.target.value }))} />
          </div>
          <div className="pt-4">
            <button type="submit" disabled={!allFilled || loading} className={`w-full font-label-caps text-label-caps py-4 transition-colors ${allFilled && !loading ? 'bg-primary text-on-primary hover:bg-primary-container' : 'bg-surface-container text-outline cursor-not-allowed'}`}>
              {loading ? 'GUARDANDO...' : 'CONTINUAR'} {!loading && <span className="material-symbols-outlined text-sm ml-2 align-middle">arrow_forward</span>}
            </button>
          </div>
        </form>
        <div className="mt-4">
          <Link href="/onboarding/user" className="flex items-center gap-1 text-outline font-label-caps text-[10px] hover:text-primary transition-colors">
            <span className="material-symbols-outlined text-sm">arrow_back</span>VOLVER
          </Link>
        </div>
      </main>
    </div>
  )
}
</script>

<script type="text/plain" data-path="context/AuthContext.tsx">'use client'
import { createContext, useContext, useEffect, useState } from 'react'
import type { Session, User } from '@supabase/supabase-js'
import { insforge } from '@/lib/insforge'

interface AuthContextValue {
  session: Session | null
  user: User | null
  loading: boolean
  signOut: () => Promise<void>
}

const AuthContext = createContext<AuthContextValue>({
  session: null,
  user: null,
  loading: true,
  signOut: async () => {},
})

export function AuthProvider({ children }: { children: React.ReactNode }) {
  const [session, setSession] = useState<Session | null>(null)
  const [loading, setLoading] = useState(true)

  useEffect(() => {
    insforge.auth.getSession().then(({ data }) => {
      setSession(data.session)
      setLoading(false)
    })
    const { data: { subscription } } = insforge.auth.onAuthStateChange((_event, session) => {
      setSession(session)
    })
    return () => subscription.unsubscribe()
  }, [])

  return (
    <AuthContext.Provider value={{
      session,
      user: session?.user ?? null,
      loading,
      signOut: () => insforge.auth.signOut().then(() => {}),
    }}>
      {children}
    </AuthContext.Provider>
  )
}

export const useAuth = () => useContext(AuthContext)
</script>

<script type="text/plain" data-path="supabase/migrations/001_initial_schema.sql">-- PureMatch — Esquema inicial de base de datos
-- Ejecutar en: InsForge Dashboard → SQL Editor
-- O desde terminal: psql $DATABASE_URL -f supabase/migrations/001_initial_schema.sql

-- ─── Extensiones ──────────────────────────────────────────────────────────────
create extension if not exists "uuid-ossp";

-- ─── Tabla: users ─────────────────────────────────────────────────────────────
create table if not exists public.users (
  id          uuid primary key default uuid_generate_v4(),
  name        text not null,
  email       text not null unique,
  phone       text,
  rut         text,
  zone        text,
  avatar_url  text,
  created_at  timestamptz not null default now()
);

-- ─── Tabla: dogs ──────────────────────────────────────────────────────────────
create table if not exists public.dogs (
  id               uuid primary key default uuid_generate_v4(),
  owner_id         uuid not null references public.users(id) on delete cascade,
  name             text not null,
  breed            text not null,
  age              text not null,
  sex              text not null check (sex in ('Macho', 'Hembra')),
  pedigree_number  text,
  zone             text,
  verified         boolean not null default false,
  score            integer not null default 0 check (score between 0 and 100),
  photos           text[] not null default '{}',
  created_at       timestamptz not null default now()
);

-- ─── Tabla: documents ─────────────────────────────────────────────────────────
create table if not exists public.documents (
  id           uuid primary key default uuid_generate_v4(),
  dog_id       uuid not null references public.dogs(id) on delete cascade,
  type         text not null check (type in ('pedigree', 'vaccines', 'health')),
  file_url     text not null,
  status       text not null default 'pending' check (status in ('pending', 'approved', 'rejected')),
  uploaded_at  timestamptz not null default now(),
  reviewed_at  timestamptz
);

-- ─── Tabla: matches ───────────────────────────────────────────────────────────
create table if not exists public.matches (
  id                uuid primary key default uuid_generate_v4(),
  dog_a_id          uuid not null references public.dogs(id) on delete cascade,
  dog_b_id          uuid not null references public.dogs(id) on delete cascade,
  status_a          text not null default 'pending' check (status_a in ('pending', 'accepted', 'rejected')),
  status_b          text not null default 'pending' check (status_b in ('pending', 'accepted', 'rejected')),
  contact_unlocked  boolean not null default false,
  unlocked_at       timestamptz,
  created_at        timestamptz not null default now(),
  unique (dog_a_id, dog_b_id)
);

-- ─── Row Level Security ───────────────────────────────────────────────────────
alter table public.users enable row level security;
alter table public.dogs enable row level security;
alter table public.documents enable row level security;
alter table public.matches enable row level security;

-- Users: cada usuario ve solo su propio perfil
create policy "users: own row" on public.users
  for all using (auth.uid() = id);

-- Dogs: propietario gestiona, todos pueden leer perros verificados
create policy "dogs: owner manage" on public.dogs
  for all using (auth.uid() = owner_id);

create policy "dogs: public read verified" on public.dogs
  for select using (verified = true);

-- Documents: solo el propietario del perro
create policy "documents: owner manage" on public.documents
  for all using (
    auth.uid() = (select owner_id from public.dogs where id = dog_id)
  );

-- Matches: las dos partes involucradas
create policy "matches: participants" on public.matches
  for all using (
    auth.uid() = (select owner_id from public.dogs where id = dog_a_id)
    or
    auth.uid() = (select owner_id from public.dogs where id = dog_b_id)
  );
</script>

<script>
const scripts=document.querySelectorAll('script[type="text/plain"][data-path]');
document.getElementById('count').textContent=scripts.length;
async function dl(){
  const btn=document.getElementById('btn'),s=document.getElementById('status');
  btn.disabled=true;btn.textContent='Generando...';s.textContent='';
  try{
    const z=new JSZip();
    scripts.forEach(el=>z.file(el.dataset.path, el.textContent));
    const blob=await z.generateAsync({type:'blob',compression:'DEFLATE'});
    saveAs(blob,'PureMatch.zip');
    s.textContent='✓ Descarga lista';btn.textContent='⬇ Descargar PureMatch.zip';btn.disabled=false;
  }catch(e){s.textContent='Error: '+e.message;btn.textContent='⬇ Descargar PureMatch.zip';btn.disabled=false;}
}
</script>
